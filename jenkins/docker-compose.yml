version: "3.9"
name: mlops-student-workshop

services:
  jenkins:
    image: mlops-student-workshop-jenkins:local
    container_name: mlops-student-workshop-jenkins
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    ports:
      - "8080:8080"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ../:/workspace
    environment:
      # Keep Jenkins setup simple for local demo runs.
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false

volumes:
  jenkins_home:

